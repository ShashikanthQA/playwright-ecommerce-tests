name: Playwright Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      # ✅ Start your app
      - run: npm run build
      - run: npm run start &

      # ✅ Wait for server
      - run: npx wait-on http://localhost:3000

      # ✅ Install browsers
      - run: npx playwright install --with-deps

      # ✅ Run tests
      - run: npx playwright test
